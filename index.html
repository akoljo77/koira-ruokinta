<!DOCTYPE html>
<html lang="fi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🐶 Ruokinta</title>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

h1 { 
  margin:20px;
  font-size:40px;
}

/* ✅ Koirakuva, 2× koko */
#dog {
  width:300px;
  margin-top:10px;
  margin-bottom:10px;
}

button {
  width:90%;
  height:180px;
  font-size:40px;
  margin:15px;
  border-radius:25px;
  border:none;
}

.red { background:#d9534f; }
.green { background:#5cb85c; }
</style>
</head>

<body>

<h1>🐶 RUOKINTA</h1>

<!-- ✅ KOIRAKUVA -->
<img id="dog" src="https://akoljo77.github.io/koira-ruokinta/koira.png" alt="koira">

<button id="morning">AAMU</button>
<button id="evening">ILTA</button>

<!-- ✅ Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaPyc0p0Mqqt6zY4ZcI-dk2PpL4AMnw9g",
  authDomain: "koira-ruokinta.firebaseapp.com",
  databaseURL: "https://koira-ruokinta-default-rtdb.firebaseio.com",
  projectId: "koira-ruokinta",
  storageBucket: "koira-ruokinta.firebasestorage.app",
  messagingSenderId: "625228203495",
  appId: "1:625228203495:web:d6dc81cf694dcc40636942",
  measurementId: "G-18BCRT569S"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, "feeding");

let feeding = {
  morning: false,
  evening: false,
  date: new Date().toDateString()
};

function updateUI() {
  document.getElementById("morning").className =
    feeding.morning ? "green" : "red";

  document.getElementById("evening").className =
    feeding.evening ? "green" : "red";
}

function saveToFirebase() {
  set(dbRef, feeding);
}

onValue(dbRef, (snapshot) => {
  const val = snapshot.val();
  if (!val) return;
  feeding = val;
  updateUI();
});

document.getElementById("morning").onclick = () => {
  feeding.morning = !feeding.morning;
  saveToFirebase();
};

document.getElementById("evening").onclick = () => {
  feeding.evening = !feeding.evening;
  saveToFirebase();
};

// ✅ Puolenyön resetointi
setInterval(() => {
  const now = new Date();
  const today = now.toDateString();
  if (feeding.date !== today) {
    feeding = { morning:false, evening:false, date:today };
    saveToFirebase();
  }
}, 60000);


// ✅ Uusi LUOTETTAVA hälytyskoodi klo 18
let alertedToday = false;

function checkAlert() {
  const now = new Date();

  // Nollaa varoitus uuden päivän alussa
  if (now.getHours() === 0 && now.getMinutes() === 0) {
    alertedToday = false;
  }

  // Hälytys klo 18 (vain kerran päivässä)
  if (now.getHours() === 18 && !alertedToday) {
    if (!feeding.morning || !feeding.evening) {
      alertedToday = true;

      alert("RUOKINTA!");

      // ✅ Aito, kuuluva hälytysääni
      const audio = new Audio(
        "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
      );
      audio.volume = 1.0;
      audio.play();
    }
  }
}

// ✅ Tarkistus 5 sek välein (toimii paljon luotettavammin kuin minuttitarkistus)
setInterval(checkAlert, 5000);

// ✅ Tarkista hälytys myös, jos appi herää taustalta
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    checkAlert();
  }
});
</script>

</body>
</html>
