<!DOCTYPE html>
<html lang="fi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title> Ruokinta</title>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

h1 { 
  margin:20px;
  font-size:40px;
}

#dog {
  width:300px;
  margin-top:10px;
  margin-bottom:10px;
}

button {
  width:90%;
  height:180px;
  font-size:40px;
  margin:15px;
  border-radius:25px;
  border:none;
}

.red { background:#d9534f; }
.green { background:#5cb85c; }
</style>
</head>

<body>

<h1>RUOKINTA</h1>

<img id="dog" src="https://akoljo77.github.io/koira-ruokinta/koira.png" alt="koira">

<button id="morning">AAMU</button>
<button id="evening">ILTA</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "koira-ruokinta.firebaseapp.com",
  databaseURL: "https://koira-ruokinta-default-rtdb.firebaseio.com",
  projectId: "koira-ruokinta",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, "feeding");

function updateUI() {
  document.getElementById("morning").className =
    feeding.morning ? "green" : "red";

  document.getElementById("evening").className =
    feeding.evening ? "green" : "red";
}

let feeding = {
  morning: false,
  evening: false,
  date: 0
};

function saveToFirebase() {
  set(dbRef, feeding);
}

// 🔥 Kuuntele Firebasea
onValue(dbRef, (snapshot) => {
  const val = snapshot.val();
  if (!val) return;

  feeding = val;
  updateUI();
});

// Napit
document.getElementById("morning").onclick = () => {
  feeding.morning = !feeding.morning;
  saveToFirebase();
};

document.getElementById("evening").onclick = () => {
  feeding.evening = !feeding.evening;
  saveToFirebase();
};


// 🔔 Hälytys klo 18
let alertedToday = false;

function checkAlert() {
  const now = new Date();

  if (now.getHours() === 0 && now.getMinutes() === 0) {
    alertedToday = false;
  }

  if (now.getHours() === 18 && !alertedToday) {
    if (!feeding.morning || !feeding.evening) {
      alertedToday = true;

      alert("RUOKINTA!");

      const audio = new Audio(
        "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
      );
      audio.play();
    }
  }
}

setInterval(checkAlert, 5000);

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    checkAlert();
  }
});
</script>

</body>
</html>
